# ==========================================
# GNN ISOTOPE SHIFT PIPELINE CONFIGURATION
# ==========================================
# Molecule physical data (masses, isotope list) lives in configs/molecules.yaml,
# not here -- this file only names which molecule(s) to train on plus
# training/execution settings.

experiment:
  name: "CO_Run"
  output_base_dir: "./data/outputs"

execution:
  ensemble_run: false
  num_seeds: 5  # only used when ensemble_run: true
  base_seed: 42

molecules: ["CO"]

# ------------------------------------------
# DATA & FEATURES
# ------------------------------------------
data:
  input_dir: "./data/states/"
  max_energy_cutoff: 20000.0  # Keeps network focused on isotopic shifts, not high-energy breakdown
  max_diff_cutoff: null

  # The explicit mass-ratio features that will be ZERO-CENTERED and fed to the
  # Linear Bypass (a J_ext(J_ext+1) term is always added automatically -- see model.py)
  physics_features:
    - 'mass_ratio_A'
    - 'mass_ratio_B'
    - 'mu_vib_ratio'
    - 'mu_rot_ratio'

  # Open-shell/Hyperfine padding: If a molecule lacks these in its .states file,
  # the dataset.py script will auto-pad them with 0.0 to maintain consistent tensor dimensions.
  optional_quantum_features: []

# ------------------------------------------
# MODEL ARCHITECTURE
# ------------------------------------------
model:
  architecture: "HybridIsotopologueGATv2"
  hidden_dim: 32
  heads: 4
  dropout: 0.2

  # Edge categorical embedding (0: Physical, 1: Isotopic)
  edge_embedding_dim: 8
  num_edge_types: 2

# ------------------------------------------
# TRAINING PARAMETERS
# ------------------------------------------
training:
  epochs: 2500
  learning_rate: 0.001
  patience: 100

  # Scales the target shift values to a more GNN-friendly range (e.g., 0.001 cm^-1 becomes 1.0 after scaling)
  scale_factor: 1000.0

  # Crucial parameter separation to protect the Linear Physics bypass from shrinking
  weight_decay_gnn: 0.0001
  weight_decay_physics: 0.0

  # Fraction of each vibronic band's highest-J MARVEL states held out for the
  # J-extrapolation split (always run -- see src/train.py run_j_extrapolation_split)
  j_holdout_frac: 0.2

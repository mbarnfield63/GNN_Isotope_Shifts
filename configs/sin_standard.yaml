# ==========================================
# GNN ISOTOPE SHIFT PIPELINE CONFIGURATION
# ==========================================
# Molecule physical data (masses, isotope list) lives in configs/molecules.yaml,
# not here -- this file only names which molecule(s) to train on plus
# training/execution settings.

experiment:
  name: "SiN_Run"
  output_base_dir: "./data/outputs"

execution:
  ensemble_run: false
  num_seeds: 5  # only used when ensemble_run: true
  base_seed: 42

molecules: ["SiN"]

# ------------------------------------------
# DATA & FEATURES
# ------------------------------------------
data:
  input_dir: "./data/states/"
  max_energy_cutoff: 20000.0
  max_diff_cutoff: null

  # The explicit mass-ratio features that will be ZERO-CENTERED and fed to the
  # Linear Bypass (a J_ext(J_ext+1) term is always added automatically -- see model.py)
  physics_features:
    - 'mass_ratio_A'
    - 'mass_ratio_B'
    - 'mu_vib_ratio'
    - 'mu_rot_ratio'

  optional_quantum_features: []

# ------------------------------------------
# MODEL ARCHITECTURE
# ------------------------------------------
model:
  architecture: "HybridIsotopologueGATv2"
  hidden_dim: 32
  heads: 4
  dropout: 0.2
  edge_embedding_dim: 8
  num_edge_types: 2

# ------------------------------------------
# TRAINING PARAMETERS
# ------------------------------------------
training:
  epochs: 2500
  learning_rate: 0.001
  patience: 100
  scale_factor: 1000.0
  weight_decay_gnn: 0.0001
  weight_decay_physics: 0.0

  # SiN has just one MARVEL isotopologue, so J-extrapolation is its only eval mode.
  j_holdout_frac: 0.2
